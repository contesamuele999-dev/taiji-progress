<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#171210">
<title>Taiji Progress · 太極</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#171210; --bg2:#241a12; --card:#211913; --card2:#2a2018; --line:#3d2e21; --line2:#54402c;
  --txt:#ece3d4; --mut:#a5947d;
  --red:#c0452f; --red2:#8e3322; --gold:#d9b35c; --gold2:#a8853a;
  --jade:#3fa98c; --jade2:#2e7d6b; --ink:#0f0c0a;
  --r:4px;
  --zh:'ZCOOL XiaoWei','Noto Serif',serif; --cal:'Ma Shan Zheng','Noto Serif',cursive;
}
/* === TEMI COLORE === (l'attivo è impostato su <html data-theme="…">) */
html[data-theme="bluegold"]{
  --bg:#0c1320; --bg2:#13233a; --card:#142033; --card2:#1b2c45; --line:#27405f; --line2:#36567c;
  --txt:#e8eefb; --mut:#9fb2cd;
  --red:#c9962f; --red2:#9c6f1f; --gold:#e6c878; --gold2:#bb9a44;
  --jade:#4aa3c7; --jade2:#2f7da0; --ink:#070c15;
}
html[data-theme="jade"]{
  --bg:#0c1512; --bg2:#10241d; --card:#11201a; --card2:#172d25; --line:#244a3c; --line2:#346455;
  --txt:#e6f0ea; --mut:#9bb6ab;
  --red:#cf7a4a; --red2:#a25a31; --gold:#e3c97f; --gold2:#b59c4c;
  --jade:#56c6a3; --jade2:#338f74; --ink:#060d0a;
}
html[data-theme="plum"]{
  --bg:#160d16; --bg2:#26152a; --card:#1f1322; --card2:#2a1b2f; --line:#43294a; --line2:#5d3a66;
  --txt:#f0e6f0; --mut:#bda3c0;
  --red:#c8517a; --red2:#9a3a5b; --gold:#dcb86a; --gold2:#ad8c45;
  --jade:#7d7bd0; --jade2:#5a57a8; --ink:#0d070e;
}
html[data-theme="sumi"]{
  --bg:#141414; --bg2:#1f1f1f; --card:#1c1c1c; --card2:#262626; --line:#383838; --line2:#4d4d4d;
  --txt:#ececec; --mut:#9a9a9a;
  --red:#b34a3a; --red2:#8a382c; --gold:#cdb070; --gold2:#9f874f;
  --jade:#7fae9b; --jade2:#5c8473; --ink:#0a0a0a;
}
html[data-theme="paper"]{
  --bg:#efe7d6; --bg2:#e3d7bf; --card:#f6f0e3; --card2:#ece2cd; --line:#d2c3a4; --line2:#bda988;
  --txt:#2a2118; --mut:#7a6a52;
  --red:#b03a26; --red2:#8e3322; --gold:#a8762a; --gold2:#8a5f1f;
  --jade:#2e8a72; --jade2:#236b58; --ink:#fbf7ee;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:'Noto Serif',Georgia,serif;background:var(--bg);color:var(--txt);font-size:15px;line-height:1.5;
  background-image:radial-gradient(ellipse at 50% -20%, var(--bg2) 0%, var(--bg) 60%)}
/* fascia a meandro (雷纹) */
.meander{height:6px;background:
  repeating-linear-gradient(90deg,var(--gold2) 0 2px,transparent 2px 8px),
  repeating-linear-gradient(90deg,transparent 0 4px,var(--gold2) 4px 6px,transparent 6px 8px);
  opacity:.5}
header{position:sticky;top:0;z-index:10;background:color-mix(in srgb, var(--bg) 92%, transparent);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line2);padding:10px 14px;display:flex;align-items:center;gap:10px}
header h1{font-size:18px;margin:0;font-weight:600;font-family:var(--zh);letter-spacing:1px}
header h1 .zh{font-family:var(--cal);color:var(--red);font-size:22px;margin-right:6px}
header h1 .gd{color:var(--gold)}
header .sp{flex:1}
.hdrmenu{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.hdrmenu #hdracts,.hdrmenu #hdrauth{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.menutoggle{display:none;font-size:18px;line-height:1;padding:6px 11px}
.seldrop{width:auto;min-width:96px;background:var(--card);border:1px solid var(--line2);color:var(--mut);
  border-radius:2px;padding:6px 8px;font-size:12.5px;font-family:var(--zh);cursor:pointer}
@media(max-width:600px){
  .menutoggle{display:inline-block}
  .hdrmenu{position:absolute;top:100%;right:8px;left:8px;flex-direction:column;align-items:stretch;
    background:var(--card);border:1px solid var(--line2);border-radius:6px;padding:10px;gap:8px;
    box-shadow:0 8px 24px rgba(0,0,0,.5);display:none;z-index:20}
  body.menuopen .hdrmenu{display:flex}
  .hdrmenu #hdracts,.hdrmenu #hdrauth{flex-direction:column;align-items:stretch;gap:8px}
  .hdrmenu .btn{width:100%;text-align:center}
  .hdrmenu .seldrop{width:100%;text-align:center;text-align-last:center}
}
nav{display:flex;gap:6px;overflow-x:auto;padding:10px 14px 2px;scrollbar-width:none;max-width:790px;margin:0 auto}
nav::-webkit-scrollbar{display:none}
nav button{flex-shrink:0;background:transparent;border:1px solid var(--line2);color:var(--mut);padding:7px 14px;
  border-radius:2px;font-size:13.5px;cursor:pointer;font-family:var(--zh);letter-spacing:.5px}
nav button .zh{font-family:var(--cal);margin-right:5px;font-size:14px;color:var(--gold2)}
nav button.on{background:var(--red2);border-color:var(--red);color:#fff}
nav button.on .zh{color:var(--gold)}
.beta-tag{background:var(--gold2);color:var(--ink);font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;vertical-align:middle}
main{max-width:760px;margin:0 auto;padding:14px 14px 110px}
h2{font-family:var(--zh);font-weight:600;letter-spacing:.5px;scroll-margin-top:64px}
.sec,.card{scroll-margin-top:64px}
select{appearance:none;-webkit-appearance:none}
.tabs{display:flex;gap:8px;margin:4px 0 14px}
.tabs button{flex:1;background:var(--card);border:1px solid var(--line);color:var(--mut);padding:9px;border-radius:2px;font-size:14px;cursor:pointer;font-family:var(--zh)}
.tabs button.on{border-color:var(--gold);color:var(--gold);background:var(--card2)}
/* card con angoli ornamentali */
.card,.sec{position:relative;background:var(--card);border:1px solid var(--line2);border-radius:var(--r);padding:14px;margin-bottom:12px}
.card::before,.sec::before{content:'';position:absolute;inset:3px;border:1px solid var(--line);border-radius:2px;pointer-events:none}
.card{cursor:pointer}
.card:active{background:var(--card2)}
.card h3{margin:0 0 6px;font-size:16px;font-weight:600;font-family:var(--zh)}
.sec h4{margin:0 0 10px;font-size:14.5px;color:var(--gold);font-weight:600;font-family:var(--zh);letter-spacing:1px}
.sec h4::before{content:'「';color:var(--red);margin-right:2px}
.sec h4::after{content:'」';color:var(--red);margin-left:2px}
.bar{height:7px;background:var(--ink);border-radius:0;overflow:hidden;margin:8px 0 4px;border:1px solid var(--line)}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--jade2),var(--jade))}
.bar i.gold{background:linear-gradient(90deg,var(--gold2),var(--gold))}
.sub{color:var(--mut);font-size:12.5px}
.btn{background:var(--red2);border:1px solid var(--red);color:#fff;padding:9px 16px;border-radius:2px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--zh);letter-spacing:.5px}
.btn.ghost{background:transparent;border:1px solid var(--line2);color:var(--mut)}
.btn.sm{padding:6px 11px;font-size:12.5px}
.btn.gold{background:var(--gold2);border-color:var(--gold);color:#1c130b}
.btn.jade{background:var(--jade2);border-color:var(--jade)}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
/* figure */
.fig{display:flex;align-items:center;gap:10px;padding:9px 8px;border-bottom:1px solid var(--line)}
.fig:last-child{border-bottom:none}
.fig .num{width:26px;text-align:right;color:var(--mut);font-size:12px;flex-shrink:0;font-family:var(--zh)}
.fig .figthumb{width:48px;height:48px;object-fit:cover;border-radius:3px;border:1px solid var(--line2);flex-shrink:0;cursor:pointer;background:var(--ink)}
.fig .name{flex:1;cursor:pointer;user-select:none}
/* niente font-weight qui: cambierebbe la larghezza del testo e farebbe spostare/andare a capo le righe. Uso text-stroke, che non altera le metriche del testo. */
.fig.cur .name{color:var(--gold);-webkit-text-stroke:.35px var(--gold)}
.dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--mut);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
.s1 .dot{border-color:var(--red);background:rgba(192,69,47,.25)}
.s2 .dot{border-color:var(--jade);background:var(--jade2)}
.s3 .dot{border-color:var(--gold);background:var(--gold);color:#22180c}
.s2 .name,.s3 .name{color:var(--txt)}
.s0 .name{color:var(--mut)}
.s1 .name{color:#d98a77}
.ts{width:52px;background:var(--ink);border:1px solid var(--line);color:var(--mut);border-radius:2px;padding:4px 5px;font-size:12px;text-align:center}
.play{background:none;border:none;color:var(--gold);font-size:15px;cursor:pointer;padding:2px 4px}
.tslabel{min-width:46px;text-align:center;color:var(--gold2);font-size:12px;font-family:var(--zh);cursor:pointer;border:1px solid var(--line);border-radius:2px;padding:3px 6px}
.medrow{display:inline-flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0}
.medthumb{width:40px;height:40px;object-fit:cover;border-radius:3px;border:1px solid var(--line2);cursor:pointer;background:var(--ink)}
.tslabel:hover{color:var(--gold);border-color:var(--gold2)}
.figzoom-wrap{width:100%;max-height:74vh;overflow:auto;border-radius:4px;border:1px solid var(--line2);background:var(--ink);touch-action:pinch-zoom}
.figzoom-wrap img{display:block;width:100%;height:auto;touch-action:pinch-zoom}
.figvid{position:relative;width:100%;padding-top:56.25%;border-radius:4px;overflow:hidden;border:1px solid var(--line2);background:#000}
.figvid iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.lesvid{position:relative;width:100%;padding-top:56.25%;border-radius:6px;overflow:hidden;border:1px solid var(--line2);background:#000}
.lesvid iframe,.lesvid video{position:absolute;inset:0;width:100%;height:100%;border:0}
.lesvid-raw{position:relative;overflow:hidden;border-radius:6px}
.lesvid-raw iframe,.lesvid-raw video{max-width:100%;border-radius:6px;border:0}
.modal .box.wide{max-width:760px}
.clock{font-size:44px;font-weight:700;text-align:center;font-variant-numeric:tabular-nums;margin:6px 0 12px;letter-spacing:1px;font-family:var(--zh);color:var(--gold)}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin:10px 0;font-size:12px;color:var(--mut)}
.legend span{display:flex;align-items:center;gap:5px}
.legend i{width:12px;height:12px;border-radius:50%;display:inline-block;border:2px solid var(--mut)}
.legend .l1 i{border-color:var(--red);background:rgba(192,69,47,.25)}
.legend .l2 i{border-color:var(--jade);background:var(--jade2)}
.legend .l3 i{border-color:var(--gold);background:var(--gold)}
.det{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--line)}
.det:last-child{border-bottom:none}
.det .st{flex-shrink:0;cursor:pointer;font-size:17px;width:24px;text-align:center;user-select:none}
.det .tx{flex:1}
.det .tx small{display:block;color:var(--mut)}
.det.done .tx{color:var(--mut);text-decoration:line-through}
input[type=text],input[type=url],input[type=date],input[type=number],input[type=password],input[type=email],textarea,select{width:100%;background:var(--ink);border:1px solid var(--line2);color:var(--txt);border-radius:2px;padding:9px 11px;font-size:14px;font-family:inherit}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--gold2);box-shadow:0 0 0 2px rgba(217,179,92,.12)}
/* campo password con pulsante mostra/nascondi */
.pwrap{position:relative}
.pwrap input{padding-right:42px}
.pwrap .eye{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--mut);cursor:pointer;font-size:16px;padding:4px 6px;line-height:1}
.pwrap .eye:hover{color:var(--gold)}
textarea{min-height:140px;resize:vertical}
/* input file uniformato al tema */
input[type=file]{font-size:12.5px;color:var(--mut);background:var(--ink);border:1px solid var(--line2);border-radius:4px;padding:6px 8px;width:100%;cursor:pointer}
input[type=file]::file-selector-button{font-family:var(--zh);background:var(--card);color:var(--gold2);border:1px solid var(--line2);border-radius:3px;padding:6px 12px;margin-right:10px;cursor:pointer;font-size:12.5px;transition:border-color .15s,color .15s}
input[type=file]::file-selector-button:hover{border-color:var(--gold2);color:var(--gold)}
input[type=file]::-webkit-file-upload-button{font-family:var(--zh);background:var(--card);color:var(--gold2);border:1px solid var(--line2);border-radius:3px;padding:6px 12px;margin-right:10px;cursor:pointer;font-size:12.5px}
label{display:block;font-size:12.5px;color:var(--mut);margin:12px 0 5px;font-family:var(--zh)}
.x{background:none;border:none;color:var(--mut);cursor:pointer;font-size:15px;padding:2px 6px}
/* badge notifiche */
.nbtn{position:relative}
.nbadge{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;padding:0 4px;margin-left:5px;border-radius:9px;background:var(--red);color:#fff;font-size:10px;font-weight:700;font-family:var(--zh);vertical-align:middle;line-height:1}
nav .nbadge{position:absolute;top:4px;right:6px;margin:0}
.back{background:none;border:none;color:var(--gold);font-size:14.5px;cursor:pointer;padding:0;font-weight:600;font-family:var(--zh)}
.pill{font-size:11px;background:var(--card2);border:1px solid var(--line2);color:var(--mut);padding:2px 8px;border-radius:2px;font-family:var(--zh)}
.grp{font-family:var(--zh);color:var(--mut);margin:18px 2px 8px;font-size:13px;letter-spacing:1.5px;text-transform:uppercase}
.grp .zh{font-family:var(--cal);color:var(--red);font-size:17px;margin-right:6px}
.grp.locked,.grp.locked .zh{color:var(--mut);opacity:.6}
.card.locked{cursor:not-allowed;opacity:.5;filter:grayscale(.5)}
.card.locked:active{background:var(--card)}
.card.locked h3{color:var(--mut)}
.lockbar{margin:0 2px 10px;padding:8px 10px;font-family:var(--zh);font-size:12.5px;color:var(--gold2);
  background:var(--card);border:1px dashed var(--line2);border-radius:2px}
.big{font-size:30px;color:var(--gold);font-family:var(--zh)}
.times{list-style:none;margin:8px 0 0;padding:0}
.times li{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line);font-size:13.5px;color:var(--mut)}
.times li b{color:var(--txt);font-variant-numeric:tabular-nums}
.empty{color:var(--mut);font-size:13.5px;text-align:center;padding:18px 0;font-style:italic}
/* sigillo (FAB) */
.fab{position:fixed;right:18px;bottom:18px;width:58px;height:58px;border-radius:6px;background:var(--red);color:#fff;
  border:2px solid #e8d9b0;outline:2px solid var(--red);font-size:30px;cursor:pointer;box-shadow:0 4px 18px rgba(0,0,0,.55);z-index:9;
  font-family:var(--cal);display:flex;align-items:center;justify-content:center;line-height:1}
.fab.adv{right:auto;left:18px;background:var(--card2);border-color:var(--gold2);outline-color:var(--line2);color:var(--gold);font-size:24px}
svg.chart{width:100%;height:120px;display:block}
.hint{font-size:12px;color:var(--mut);margin-top:8px}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:90px;background:var(--card2);border:1px solid var(--gold2);color:var(--txt);padding:9px 16px;border-radius:2px;font-size:13.5px;z-index:99;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
/* item generico con stato (tuishou, csg, combat) */
.lv{display:flex;align-items:center;gap:10px;padding:10px 6px;border-bottom:1px solid var(--line)}
.lv:last-child{border-bottom:none}
.lv .zh{font-family:var(--cal);color:var(--gold2);font-size:18px;width:30px;text-align:center;flex-shrink:0}
.lv .tx{flex:1;min-width:0;overflow-wrap:anywhere;cursor:pointer;user-select:none}
.lv .tx small{display:block;color:var(--mut);font-size:12px}
.lv .stato{font-size:11.5px;padding:3px 9px;border-radius:2px;border:1px solid var(--line2);color:var(--mut);cursor:pointer;flex-shrink:0;font-family:var(--zh);user-select:none}
.lv.k1 .stato{border-color:var(--red);color:#d98a77;background:rgba(192,69,47,.12)}
.lv.k2 .stato{border-color:var(--jade);color:var(--jade);background:rgba(63,169,140,.1)}
.lv.k3 .stato{border-color:var(--gold);color:var(--gold);background:rgba(217,179,92,.1)}
.badge{display:inline-flex;flex-direction:column;align-items:center;gap:2px;padding:8px 10px;border:1px solid var(--line2);border-radius:4px;background:var(--card2);min-width:60px;opacity:.32}
.badge.won{opacity:1;border-color:var(--gold2);box-shadow:0 0 12px rgba(217,179,92,.15)}
.badge .bz{font-family:var(--cal);font-size:24px;color:var(--gold)}
.badge small{font-size:10.5px;color:var(--mut)}
.tl{border-left:2px solid var(--line2);margin:8px 0 0 8px;padding-left:16px}
.tl .ev{position:relative;padding:6px 0 12px}
.tl .ev::before{content:'';position:absolute;left:-22.5px;top:12px;width:11px;height:11px;border-radius:50%;background:var(--red);border:2px solid var(--bg)}
.tl .ev.t2::before{background:var(--gold)}
.tl .ev .d{font-size:11.5px;color:var(--mut);font-family:var(--zh)}
.modal{position:fixed;inset:0;background:rgba(10,7,5,.7);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.modal .box{background:var(--card);border:1px solid var(--gold2);border-radius:6px 6px 0 0;padding:18px;max-width:560px;width:100%;max-height:80vh;overflow-y:auto}
.modal h3{font-family:var(--zh);color:var(--gold);margin:0 0 10px}
.modal h3::before{content:'☯ ';color:var(--red)}
.watermark{position:fixed;right:-30px;bottom:60px;font-family:var(--cal);font-size:200px;color:var(--gold);opacity:.035;pointer-events:none;z-index:0;line-height:.9;text-align:center}
.appfoot{position:relative;z-index:1;margin:34px auto 18px;max-width:760px;padding:14px 16px 0;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.foot-brand{font-size:12px;color:var(--mut);letter-spacing:.3px}
.foot-real{opacity:.7}
.foot-contact{background:none;border:none;color:var(--mut);opacity:.55;font-size:11.5px;cursor:pointer;padding:4px 6px;transition:opacity .2s}
.foot-contact:hover{opacity:1;color:var(--gold2)}
@media print{.appfoot,.watermark,header,nav,.fab,.fab.adv{display:none!important}}
</style>
</head>
<body>
<div class="watermark">太<br>極</div>
<header>
  <h1><span class="zh">太極</span>Taiji <span class="gd">Progress</span></h1>
  <div class="sp"></div>
  <button class="btn ghost sm menutoggle" onclick="toggleHdrMenu()" aria-label="Menu" title="Menu">☰</button>
  <div class="hdrmenu" id="hdrmenu">
    <span id="hdracts"></span>
    <span id="hdrauth"></span>
  </div>
  <input type="file" id="imp" accept=".json" style="display:none" onchange="importData(event)">
</header>
<div class="meander"></div>
<nav id="nav"></nav>
<main id="app"></main>
<button class="fab" id="fab" onclick="fabAction()" title="Aggiungi">進</button>
<button class="fab adv" onclick="openAdvisor()" title="Assistente">💡</button>
<div id="modal"></div>
<div class="toast" id="toast"></div>
<footer class="appfoot">
  <span class="foot-brand"><span class="zh" style="font-family:var(--cal);color:var(--gold2);margin-right:5px">陳</span>by Chen Cheng Shui <span class="foot-real">(Samuele Contessa)</span></span>
  <button class="foot-contact" onclick="openContactDev()" title="Collaborazioni">✉ <span>Contatta lo sviluppatore</span></button>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ==================== DATI DI DEFAULT (tutto modificabile) ==================== */
const F=n=>({n,s:0,t:null});
const SEED=[

/* Livelli effettivi: se l'istruttore ha personalizzato S.levels usa quelli, altrimenti i default.
   Forma di S.levels: [{lv:'id', zh:'初', name:'Nome personalizzato'} , ...] */
function getLevels(){
  if(typeof S!=='undefined'&&S&&Array.isArray(S.levels)&&S.levels.length)
    return S.levels.map(l=>[l.lv,l.zh||'級',l.name||l.lk||l.lv,!!l.custom]);
  return LVLS.map(x=>[x[0],x[1],x[2],false]);
}
/* Etichetta di un livello: se è una chiave i18n nota la traduce, altrimenti la mostra com'è */
function lvlLabel(lvOrKey){
  const L=getLevels().find(x=>x[0]===lvOrKey);
  const key=L?L[2]:lvOrKey;
  const tr=t(key);
  return tr!==key?tr:key; // se non è una chiave i18n, è già il nome letterale
}

/* Forma 18 — tempi (secondi) e frame delle figure ricavati automaticamente dal video
   (analisi del movimento: posizioni di assestamento). Immagini in figure/forma-18/NN.jpg */
const FORMA18={id:'forma-18',video:'https://www.youtube.com/watch?v=Y8blRTDDXZc',
 t:[17,22,26,32,36,43,47,56,66,71,77,88,94,109,124,130,134,141]};
function load(){
  try{S=JSON.parse(localStorage.getItem(KEY));}catch(e){S=null;}
  if(!S) S={forms:SEED.map(blankForm),tab:'mano'};
  if(!S.ver||S.ver<2){
    S.forms=S.forms.filter(f=>!['forma-19','forma-38'].includes(f.id));
    SEED.forEach(sf=>{if(!S.forms.find(f=>f.id===sf.id))S.forms.push(blankForm(sf));});
    S.forms.forEach(f=>{const sf=SEED.find(x=>x.id===f.id);
      if(sf&&!f.figures.length&&sf.figures.length)f.figures=sf.figures.map(x=>({...x}));
      if(sf)f.name=sf.name;});
    const ord=f=>{const i=SEED.findIndex(x=>x.id===f.id);return i<0?99:i;};
    S.forms.sort((a,b)=>ord(a)-ord(b));
    S.ver=2;
  }
  if(S.ver<3){
    SEED.forEach(sf=>{if(!S.forms.find(f=>f.id===sf.id))S.forms.push(blankForm(sf));});
    S.forms.forEach(f=>{const sf=SEED.find(x=>x.id===f.id);
      if(sf){f.lvl=sf.lvl;if(!f.custom)f.name=sf.name;}
      f.lvl=f.lvl||'int';});
    const ord3=f=>{const i=SEED.findIndex(x=>x.id===f.id);return i<0?99:i;};
    S.forms.sort((a,b)=>ord3(a)-ord3(b));
    S.ver=3;
  }
  if(S.ver<4){
    SEED.forEach(sf=>{if(!S.forms.find(f=>f.id===sf.id))S.forms.push(blankForm(sf));});
    S.forms.forEach(f=>{const sf=SEED.find(x=>x.id===f.id);if(sf){f.lvl=sf.lvl;if(!f.custom)f.name=sf.name;}});
    const ord4=f=>{const i=SEED.findIndex(x=>x.id===f.id);return i<0?99:i;};
    S.forms.sort((a,b)=>ord4(a)-ord4(b));
    S.ver=4;
  }
  if(!S.practice)S.practice={};
  if(!S.tuishou)S.tuishou=SEED_TS.map(mkLv);
  if(!S.combat)S.combat=SEED_CB.map(mkLv);
  if(!S.csg)S.csg=SEED_CSG.map(mkLv);
  if(!S.palo)S.palo=SEED_PALO.map(x=>({id:uid(),t:x.t,zh:x.zh,times:[]}));
  // Ristrutturazione sezioni con sottosezioni (gruppi)
  if(!S.lvV2){
    S.tuishou=SEED_TS.map(mkLv);
    S.combat=SEED_CB.map(mkLv);
    S.csg=SEED_CSG.map(mkLv);
    const kept=(S.palo||[]).filter(p=>p.times&&p.times.length);
    SEED_PALO.forEach(sp=>{if(!kept.find(p=>p.t===sp.t))kept.push({id:uid(),t:sp.t,zh:sp.zh,times:[]});});
    S.palo=kept;
    S.lvV2=true;
  }
  if(!S.csgV3){ S.csg=SEED_CSG.map(mkLv); S.csgV3=true; }
  // Fondamentali Gambe/Armi diventano sezioni EDITABILI (come Chan Si Gong); il gruppo "I cinque passi" è rimosso
  if(!S.fondV2){
    const conv=arr=>{const out=[];arr.forEach(grp=>{if(/cinque passi|五步/i.test(grp.h))return;
      grp.items.forEach(it=>out.push({id:uid(),t:it[2],han:it[0],py:it[1],zh:(it[0]||'').slice(0,1)||'功',g:grp.h,v:'',s:0,note:''}));});return out;};
    S.fondmn=conv(FOND.mn); S.fondarmi=conv(FOND.armi); S.fondV2=true;
  }
  ['tuishou','combat','csg','fondmn','fondarmi'].forEach(k=>{if(S[k])S[k].forEach(x=>{if(x.g===undefined)x.g='';if(x.v===undefined)x.v='';});});
  if(S.palo)S.palo.forEach(p=>{if(p.g===undefined&&!p.cdf&&!p.desc)p.g='';}); // categoria per le posizioni del palo
  if(!S.titles)S.titles=[];
  if(!S.comps)S.comps=[];
  if(!S.lang)S.lang='it';
  if(!S.theme)S.theme='ink';
  if(!S.lessons)S.lessons=[];        // lezioni locali (istruttore senza cloud)
  if(!S.advice)S.advice=[];          // richieste di consiglio locali
  if(!S.masterNotes)S.masterNotes=[];// note ricevute dal maestro (cache)
  if(!S.seen)S.seen={notes:0,replies:0,requests:0}; // marca-tempo (ms) dell'ultimo elemento "visto" per le notifiche
  if(!S.figPDF){ // figure ufficiali dalle schede PDF: aggiorna i nomi (preserva lo stato se il numero coincide), altrimenti (ri)popola
    Object.keys(FIGPDF).forEach(id=>{const f=S.forms&&S.forms.find(x=>x.id===id),arr=FIGPDF[id];
      if(f&&arr&&arr.length){ if(f.figures.length===arr.length){f.figures.forEach((fig,i)=>{fig.n=arr[i];});}
        else {f.figures=arr.map(n=>({n,s:0,t:null}));} }});
    S.figPDF=true; }
  if(!S.paloSeq){ S.palo=S.palo||[]; // sequenza ufficiale zhan zhuang (camicia di ferro): aggiunge le posizioni mancanti
    PALOSEQ.forEach(p=>{ if(!S.palo.find(q=>q.t===p.t)) S.palo.push({id:uid(),t:p.t,zh:p.zh,desc:p.desc,times:[]}); });
    S.paloSeq=true; }
  if(!S.translitV1){ // aggiorna i nomi delle forme (traslitterazione pinyin) preservando le forme personalizzate
    (S.forms||[]).forEach(f=>{const sf=SEED.find(x=>x.id===f.id);if(sf&&!f.custom)f.name=sf.name;});
    S.translitV1=true; }
  if(!S.paloCdfAgg){ S.palo=S.palo||[]; // un solo cronometro per tutta la sequenza della camicia di ferro
    if(!S.palo.find(p=>p.cdf)) S.palo.push({id:'palo-cdf',t:'Sequenza della camicia di ferro 鐵衫',zh:'鐵',cdf:true,times:[]});
    S.paloCdfAgg=true; }
  if(!S.lessonStates)S.lessonStates={}; // stato per-allievo delle lezioni (id -> 0..3)
  if(S.owner===undefined)S.owner=null;  // utente proprietario dei dati locali (anti-fuga tra account)
  if(!S.meridLearned)S.meridLearned={}; // meridiani memorizzati (id -> true)
  if(!S.meridView)S.meridView='map';    // 'map' | 'mem'
  if(!S.meridSel)S.meridSel='all';      // id meridiano selezionato o 'all'
  if(S.meridShowMain===undefined)S.meridShowMain=true;   // filtro: mostra i 12 principali
  if(S.meridShowExtra===undefined)S.meridShowExtra=true; // filtro: mostra gli 8 straordinari
  if(!S.clearDefaultMedia){ // di default NESSUN video/screenshot precaricato: si caricano solo dallo Studio video
    (S.forms||[]).forEach(f=>{ if(f.custom)return;            // le forme personali dell'allievo restano intatte
      f.video='';
      (f.figures||[]).forEach(fig=>{fig.t=null;fig.img='';});
    });
    S.f18autoV1=true; S.clearDefaultMedia=true; }
  S.section=S.section||'forme';
  applyTheme();
  save();
}

/* Il font cinese ZCOOL rende gli apostrofi a tutta larghezza (gran spazio dopo). Li convertiamo in ʼ (U+02BC),
   che ZCOOL non possiede: ricade così sul font latino (Noto Serif) e l'apostrofo torna stretto. */
const esc=s=>String(s).replace(/['’‘´]/g,'ʼ').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* Dicitura standard di una riga-esercizio:
   «Nome italiano 漢字 (pīnyīn) · descrizione poetica»
   - it: testo italiano (può contenere nome + descrizione separati da · — , : )
   - han: caratteri cinesi (hanzi) — facoltativo
   - py: pinyin — facoltativo
   Restituisce HTML pronto per essere messo dentro <span class="tx">. */
function dicitura(it,han,py){
  it=(it||'').trim();
  let name=it,poet='';
  const m=it.split(/\s+[·—–:]\s+/);            // separa nome · descrizione
  if(m.length>1){name=m[0].trim();poet=m.slice(1).join(' · ').trim();}
  const head=`<b>${esc(name)}</b>`
    +(han?` <span class="zh" style="font-family:var(--cal);color:var(--gold2)">${esc(han)}</span>`:'')

/* ==================== UTILS ==================== */
const memo=f=>f.figures.filter(x=>x.s>=2).length;
const raff=f=>f.figures.filter(x=>x.s===3).length;
function curIdx(f){const i=f.figures.findIndex(x=>x.s<2);return i<0?f.figures.length-1:i;}
/* ---- Sblocco progressivo: l'allievo accede alle forme avanzate solo dopo
   aver completato a livello base (tutte le figure ≥ competente) le precedenti.
   Progressione separata per categoria (mano/armi); istruttori/maestri esenti. ---- */
function isInstr(){return !!(typeof AUTH!=='undefined'&&AUTH&&AUTH.profile&&AUTH.profile.role==='instructor');}
const formDone=f=>!f.figures.length||memo(f)===f.figures.length; // "completata a livello base"
function lvlUnlocked(cat,lv){
  if(isInstr())return true;
  // Le forme delle ARMI sono bloccate di default: le sblocca manualmente l'istruttore per ogni allievo.
  if(cat==='armi'&&!S.weaponsUnlocked)return false;
  const order=getLevels().map(x=>x[0]);          // es. ['pri','int','adv','comp']
  const idx=order.indexOf(lv);
  if(idx<=0)return true;                          // primo livello sempre accessibile
  for(let k=0;k<idx;k++){
    const fs=S.forms.filter(f=>f.cat===cat&&(f.lvl||'int')===order[k]);
    if(fs.length&&!fs.every(formDone))return false;
  }
  return true;
}
/* etichetta del primo livello precedente ancora da completare (per il messaggio) */
function lvlBlocker(cat,lv){
  const order=getLevels().map(x=>x[0]);
  const idx=order.indexOf(lv);
  for(let k=0;k<idx;k++){
    const fs=S.forms.filter(f=>f.cat===cat&&(f.lvl||'int')===order[k]);
    if(fs.length&&!fs.every(formDone)){return lvlLabel(order[k]);}
  }
  return '';
}
function fmtT(s){const m=Math.floor(s/60),r=Math.round(s%60);return m+':'+String(r).padStart(2,'0');}
function fmtMs(ms){const c=Math.floor(ms/10)%100,s=Math.floor(ms/1000)%60,m=Math.floor(ms/60000);
 return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+String(c).padStart(2,'0');}
function parseTs(v){if(!v)return null;const p=v.split(':').map(Number);if(p.some(isNaN))return null;
 return p.length===2?p[0]*60+p[1]:p[0];}
function videoAt(url,t){if(!url)return null;
 try{const u=new URL(url);
  if(t!=null){if(u.hostname.includes('youtu.be'))u.searchParams.set('t',t);
   else if(u.hostname.includes('youtube.com')&&u.pathname==='/watch')u.searchParams.set('t',t+'s');}
  return u.toString();}catch(e){return url;}}
const isSearch=url=>url&&url.includes('results?search');
/* costruisce un URL di EMBED (iframe) con avvio al secondo t; supporta YouTube e Wistia */
function videoEmbed(url,t){
  if(!url)return null;
  try{
    const u=new URL(url);const h=u.hostname;
    let id=null;
    if(h.includes('youtu.be'))id=u.pathname.slice(1);
    else if(h.includes('youtube.com')){
      if(u.pathname==='/watch')id=u.searchParams.get('v');
      else if(u.pathname.startsWith('/embed/'))id=u.pathname.split('/embed/')[1];
      else if(u.pathname.startsWith('/shorts/'))id=u.pathname.split('/shorts/')[1];
    }
    if(id){let e=`https://www.youtube.com/embed/${id}?rel=0&modestbranding=1&playsinline=1`;
      if(t!=null)e+='&start='+Math.floor(t);return e;}
    // Wistia: medias/<id> o wistia.com/<id> o fast.wistia.net/embed/iframe/<id>
    if(h.includes('wistia')){
      const seg=u.pathname.split('/').filter(Boolean);
      const wid=seg[seg.length-1];
      let e=`https://fast.wistia.net/embed/iframe/${wid}?playsinline=1`;
      if(t!=null)e+='&time='+Math.floor(t);return e;}
    return null;
  }catch(e){return null;}
}
const iso=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const today=()=>iso(new Date());
const fmtD=d=>d?d.split('-').reverse().join('/'):'';
function lineChart(vals,fmt){ if(vals.length<2)return '';
 const W=600,H=110,P=10,mn=Math.min(...vals),mx=Math.max(...vals),sp=(mx-mn)||1;
 const pts=vals.map((x,i)=>[P+i*(W-2*P)/(vals.length-1),H-P-(x-mn)/sp*(H-2*P)]);
 return `<svg class="chart" viewBox="0 0 ${W} ${H}">
  <polyline fill="none" stroke="#3fa98c" stroke-width="2.5" points="${pts.map(p=>p.map(x=>x.toFixed(1)).join(',')).join(' ')}"/>
  ${pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3.5" fill="#d9b35c"/>`).join('')}
  <text x="${P}" y="12" fill="#a5947d" font-size="11">max ${fmt(mx)}</text>
  <text x="${P}" y="${H-2}" fill="#a5947d" font-size="11">min ${fmt(mn)}</text></svg>`;}

/* riga media compatta (thumb + ▶) per un oggetto con campi {img,video,t} */
function mediaRow(o,title){
  if(!o)return '';

  const tt=esc(title||'').replace(/'/g,'ʼ');
  return `<span class="medrow">`
    +(hasImg?`<img class="medthumb" src="${esc(o.img)}" alt="" loading="lazy" onclick="openMediaZoom('${esc(o.img)}','${tt}')" onerror="this.style.display='none'">`:'')
    +(hasVid?`<button class="play" onclick="openMediaVideo('${esc(o.video)}',${o.t},'${tt}')" title="${esc(t('ts_open'))}">▶</button>`:'')

function saveForm(id){
  const name=document.getElementById('e_name').value.trim();
  if(!name){toast(t('enter_name'));return;}
  const cat=document.getElementById('e_cat').value;
  const video=document.getElementById('e_video').value.trim();
  const names=document.getElementById('e_figs').value.split('\n').map(s=>s.trim()).filter(Boolean);
  let f=id?S.forms.find(x=>x.id===id):null;
  if(!f){f={id:uid(),cat,name,video,figures:[],details:[],times:[],custom:true,note:''};S.forms.push(f);}
  f.name=name;f.cat=cat;f.video=video;f.lvl=document.getElementById('e_lvl').value;

  .mftoggle.on{color:var(--gold2)}
  .meridchips{display:flex;flex-wrap:wrap;gap:6px;margin:2px 0 4px}
  .mchip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line2);border-radius:14px;padding:4px 10px;font-size:11.5px;color:var(--mut);cursor:pointer;font-family:var(--zh);background:var(--card)}
  .mchip.on{color:var(--txt)}
  .mchip i{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}
  #merid3d{position:relative;width:100%;height:430px;touch-action:none;cursor:grab;display:flex;align-items:center;justify-content:center}

  .meridinfo{font-size:12px;color:var(--mut);margin-top:8px;min-height:18px;text-align:center}

function setMeridView(v){S.meridView=v;save();render();window.scrollTo(0,0);}
function selMerid(id){ S.meridSel=(S.meridSel===id?'all':id); save();
  if(S.section==='meridiani'&&S.meridView==='map'&&_merid){applyMeridHighlight();syncChips();} else render(); }
function selMeridAll(){ S.meridSel='all'; save();
  if(S.section==='meridiani'&&S.meridView==='map'&&_merid){applyMeridHighlight();syncChips();} else render(); }
function toggleMeridLearned(id){S.meridLearned[id]=!S.meridLearned[id];save();render();}

const meridMain=()=>MERID.filter(m=>!m.extra);
const meridExtra=()=>MERID.filter(m=>m.extra);
/* meridiani attualmente visibili in base ai filtri principali/straordinari */
function meridVisible(){return MERID.filter(m=>m.extra?S.meridShowExtra:S.meridShowMain);}
function toggleMeridGroup(which){
  if(which==='main')S.meridShowMain=!S.meridShowMain; else S.meridShowExtra=!S.meridShowExtra;
  // se il meridiano selezionato non è più visibile, torna a "tutti"
  if(S.meridSel!=='all'){const m=MERID.find(x=>x.id===S.meridSel);if(m&&(m.extra?!S.meridShowExtra:!S.meridShowMain))S.meridSel='all';}
  save();render();
}
function chip(m){return `<span class="mchip ${S.meridSel===m.id?'on':''}" style="${S.meridSel===m.id?`color:${m.col};border-color:${m.col}`:''}" onclick="selMerid('${m.id}')"><i style="background:${m.col}"></i>${esc(m.it)}</span>`;}
function meridChips(){
  const all=S.meridSel==='all';
  return `<div class="meridfilters">
    <div class="mfgroup">
      <div class="mfhead">
        <button class="mftoggle ${S.meridShowMain?'on':''}" onclick="toggleMeridGroup('main')">${S.meridShowMain?'☑':'☐'} 十二正經 · 12 principali</button>
      </div>
      ${S.meridShowMain?`<div class="meridchips">
        <span class="mchip ${all?'on':''}" onclick="selMeridAll()"><i style="background:var(--mut)"></i>Tutti</span>
        ${meridMain().map(chip).join('')}
      </div>`:''}
    </div>
    <div class="mfgroup">
      <div class="mfhead">
        <button class="mftoggle ${S.meridShowExtra?'on':''}" onclick="toggleMeridGroup('extra')">${S.meridShowExtra?'☑':'☐'} 奇經八脈 · 8 straordinari</button>
      </div>
      ${S.meridShowExtra?`<div class="meridchips">
        ${meridExtra().map(chip).join('')}
      </div>`:''}
    </div>
  </div>`;
}
function syncChips(){ const c=document.querySelector('.meridfilters'); if(!c)return;
  const tmp=document.createElement('div'); tmp.innerHTML=meridChips(); const nw=tmp.firstElementChild; if(nw)c.replaceWith(nw); }

function meridTree(){
  const order=['LU','LI','ST','SP','HT','SI','BL','KI','PC','TE','GB','LR'];
  const extra=['CV','GV'];
  const card=id=>{ const m=MERID.find(x=>x.id===id); if(!m)return '';
    const learned=!!S.meridLearned[id];
    const pts=m.pts.map(p=>{ const rc=p[3]==='in'?'r-in':p[3]==='end'?'r-end':'r-mid';
      return `<div class="mpt"><div class="mptc"><span class="role ${rc}"></span>${esc(p[0])} <span style="color:${m.col}">${esc(p[2])}</span></div><div class="mptn">${esc(p[1])}</div><div class="mptd">${esc(p[4])}</div></div>`;
    }).join('');
    return `<div class="mnode" style="border-left:3px solid ${m.col}">
      <div class="mhd">
        <span class="mdot" style="background:${m.col};box-shadow:0 0 7px ${m.col}"></span>
        <span class="mname">${esc(m.it)} <span style="font-family:var(--cal);color:var(--gold2);font-size:16px">${esc(m.zh)}</span></span>
        <span class="mmeta">${esc(m.py)}${m.np?' · '+esc(m.np)+' punti':''} · ${esc(m.el)} · ${esc(m.pol)}</span>
        <span class="mlearn ${learned?'on':''}" onclick="toggleMeridLearned('${m.id}')">${learned?'✓ memorizzato':'da memorizzare'}</span>
      </div>
      <div class="mrail">${pts}</div>
      <div class="mcar">${esc(m.car)}</div>
    </div>`;
  };
  const extraAll=['CV','GV','CHONG','DAI','YINWEI','YANGWEI','YINQIAO','YANGQIAO'];
  const totLearnable=order.length+extraAll.length;
  const learnedN=order.concat(extraAll).filter(id=>S.meridLearned[id]).length;
  // se un meridiano è selezionato, mostra SOLO quello
  if(S.meridSel!=='all'){
    return `
     <div class="sec">
       <h4>Memorizzazione · scheda singola 記</h4>
       <p class="hint" style="margin-top:0">Stai vedendo solo il meridiano selezionato. Tocca <b>“Tutti”</b> nei filtri per rivederli tutti.</p>
       <div class="mtree">${card(S.meridSel)}</div>
     </div>`;
  }
  const mainCards=S.meridShowMain?`
   <div class="sec">
     <h4>Circolazione dell’energia 子午流注</h4>
     <p class="hint" style="margin-top:0">Il qì scorre nei 12 meridiani in quest’ordine, come un orologio di 24 ore: dal Polmone al Fegato, poi ricomincia. Per ciascuno fissa <b>inizio (●) → punti chiave (○) → fine (◆)</b> e la caratteristica peculiare.</p>
     <div class="mtree">${order.map(id=>card(id)).join('<div class="mflow">↓</div>')}</div>
   </div>`:'';
  const extraCards=S.meridShowExtra?`
   <div class="sec">
     <h4>Otto vasi straordinari 奇經八脈</h4>
     <p class="hint" style="margin-top:0">Non hanno punti propri (tranne Rèn e Dū): scorrono attraverso punti di altri meridiani e fanno da serbatoio dell’energia. Per ciascuno è indicato il <b>punto chiave d’apertura</b>.</p>
     <div class="mtree">${extraAll.map(id=>card(id)).join('<div class="mflow">↓</div>')}</div>
   </div>`:'';
  return `${mainCards}${extraCards}
   <div class="sec">
     <h4>Avanzamento</h4>
     <div class="bar"><i style="width:${(learnedN/totLearnable*100).toFixed(0)}%"></i></div>
     <div class="sub">Meridiani memorizzati <b>${learnedN}/${totLearnable}</b></div>
   </div>`;
}

  meridCss();

  if(v!=='map')meridDispose();
  app.innerHTML=`
   <h2 style="margin:6px 0 4px"><span style="font-family:var(--cal);color:var(--red);font-size:22px;margin-right:6px">經</span>Meridiani energetici</h2>
   <p class="hint" style="margin-top:0">I 12 meridiani principali e i 2 vasi straordinari (Rèn Mài e Dū Mài). Esplora la mappa 3D, memorizza inizio/punti chiave/fine di ogni canale, o consulta il ritmo circadiano secondo la MTC.</p>

   `:v==='clock'?renderMeridClockBody():meridTree()}
  `;
  if(v==='map') initMerid3D();
}

function meridDispose(){
  if(!_merid)return;
  try{
    cancelAnimationFrame(_merid.raf);
    if(_merid.cleanup)_merid.cleanup();
    if(_merid.renderer){
      if(_merid.renderer.forceContextLoss)_merid.renderer.forceContextLoss();
      if(_merid.renderer.dispose)_merid.renderer.dispose();
      const c=_merid.renderer.domElement; if(c&&c.parentNode)c.parentNode.removeChild(c);
    }
  }catch(e){}
  _merid=null;
}

function withThree(cb){
  if(window.THREE)return cb(window.THREE);
  let s=document.getElementById('threejs-cdn');
  if(s){ s.addEventListener('load',()=>cb(window.THREE||null)); s.addEventListener('error',()=>cb(null)); return; }
  s=document.createElement('script'); s.id='threejs-cdn';
  s.src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
  s.onload=()=>cb(window.THREE||null); s.onerror=()=>cb(null);
  document.head.appendChild(s);
}

function initMerid3D(){
  const host=document.getElementById('merid3d'); if(!host)return;
  withThree(THREE=>{
    if(!document.body.contains(host))return;
    if(!THREE){ host.innerHTML='<div class="empty">Mappa 3D non disponibile offline. Connettiti a internet e riprova, oppure usa la scheda Memorizzazione.</div>'; return; }
    try{ buildMeridScene(THREE,host); }
    catch(e){ host.innerHTML='<div class="empty">Impossibile inizializzare la mappa 3D su questo dispositivo. Usa la scheda Memorizzazione.</div>'; }
  });
}

function applyMeridHighlight(){
  if(!_merid)return; const sel=S.meridSel;
  _merid.tubes.forEach(t=>{ const on=sel==='all'||t.userData.mid===sel; t.material.opacity=on?0.95:0.05; });
  _merid.dots.forEach(d=>{ d.visible=(sel==='all'||d.userData.mid===sel); });
}

function buildMeridScene(THREE,host){
  meridDispose();
  host.innerHTML='';
  const W=host.clientWidth||600, H=430;
  const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
  renderer.setSize(W,H);
  host.appendChild(renderer.domElement);
  const scene=new THREE.Scene();
  const cam=new THREE.PerspectiveCamera(45,W/H,0.1,100);
  cam.position.set(0,0,8.6); cam.lookAt(0,-0.1,0);
  const root=new THREE.Group(); root.position.y=0.1; scene.add(root);

  // corpo stilizzato, molto tenue
  const bmat=new THREE.MeshBasicMaterial({color:0x6f8f86,transparent:true,opacity:0.09,depthWrite:false});
  function addMesh(geo,x,y,z,rz){ const m=new THREE.Mesh(geo,bmat); m.position.set(x,y,z); if(rz)m.rotation.z=rz; root.add(m); }
  addMesh(new THREE.SphereGeometry(0.42,24,18),0,2.55,0);
  addMesh(new THREE.CylinderGeometry(0.12,0.13,0.4,16),0,2.15,0);
  addMesh(new THREE.CylinderGeometry(0.46,0.34,2.0,22),0,1.0,0);
  addMesh(new THREE.CylinderGeometry(0.34,0.3,0.5,18),0,-0.15,0);
  addMesh(new THREE.CylinderGeometry(0.1,0.08,2.05,12),0.82,1.0,0,0.13);
  addMesh(new THREE.CylinderGeometry(0.1,0.08,2.05,12),-0.82,1.0,0,-0.13);
  addMesh(new THREE.CylinderGeometry(0.16,0.11,3.0,14),0.22,-1.55,0);
  addMesh(new THREE.CylinderGeometry(0.16,0.11,3.0,14),-0.22,-1.55,0);

  const reg=_merid={renderer,scene,cam,root,tubes:[],dots:[],picks:[],raf:0,userInteract:false,cleanup:null};

  MERID.forEach(m=>{
    const central=m.pts[0][8]==='C';
    const sides=central?['C']:['R','L'];
    sides.forEach(side=>{
      const vs=m.pts.map(p=>new THREE.Vector3(side==='L'?-p[5]:p[5], p[6], p[7]));
      const curve=new THREE.CatmullRomCurve3(vs);
      const col=new THREE.Color(m.col);
      const tube=new THREE.Mesh(new THREE.TubeGeometry(curve,48,0.027,8,false),
        new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.95}));
      tube.userData.mid=m.id; root.add(tube); reg.tubes.push(tube);
      vs.forEach((v,i)=>{
        const big=(i===0||i===vs.length-1);
        const dot=new THREE.Mesh(new THREE.SphereGeometry(big?0.075:0.055,12,10),
          new THREE.MeshBasicMaterial({color:col}));
        dot.position.copy(v); dot.userData={mid:m.id,pi:i};
        root.add(dot); reg.dots.push(dot); reg.picks.push(dot);
      });
    });
  });
  applyMeridHighlight();

  // interazione
  const el=renderer.domElement;
  let down=false,moved=0,lx=0,ly=0,ry=0.55,rx=0.0;
  root.rotation.y=ry;
  const ray=new THREE.Raycaster(), m2=new THREE.Vector2();
  function loc(e){ const r=el.getBoundingClientRect(); const s=(e.touches&&e.touches[0])?e.touches[0]:e; return {x:s.clientX-r.left,y:s.clientY-r.top,w:r.width,h:r.height}; }
  function onDown(e){ down=true;moved=0;reg.userInteract=true; const p=loc(e);lx=p.x;ly=p.y; }
  function onMove(e){ if(!down)return; const p=loc(e); const dx=p.x-lx,dy=p.y-ly; lx=p.x;ly=p.y; moved+=Math.abs(dx)+Math.abs(dy);
    ry+=dx*0.01; rx+=dy*0.008; rx=Math.max(-0.6,Math.min(0.6,rx)); root.rotation.y=ry; root.rotation.x=rx; }
  function onUp(e){ if(down&&moved<5)pick(e); down=false; setTimeout(()=>{reg.userInteract=false;},2500); }
  function pick(e){ const p=loc(e); m2.x=(p.x/p.w)*2-1; m2.y=-(p.y/p.h)*2+1; ray.setFromCamera(m2,cam);
    const hits=ray.intersectObjects(reg.picks,false);
    if(hits.length){ const d=hits[0].object.userData; const m=MERID.find(x=>x.id===d.mid); const q=m.pts[d.pi];
      const info=document.getElementById('meridinfo');
      if(info)info.innerHTML=`<b style="color:${m.col}">${esc(q[0])} ${esc(q[2])}</b> · ${esc(q[1])} — ${esc(m.it)} · <span class="sub">${esc(q[4])}</span>`;
      if(S.meridSel!==d.mid){ S.meridSel=d.mid; save(); applyMeridHighlight(); syncChips(); }
    } }
  function onWheel(e){ e.preventDefault(); cam.position.z=Math.max(5,Math.min(13,cam.position.z+(e.deltaY>0?0.6:-0.6))); }
  function onResize(){ const w=host.clientWidth||W; renderer.setSize(w,H); cam.aspect=w/H; cam.updateProjectionMatrix(); }
  el.addEventListener('pointerdown',onDown); el.addEventListener('pointermove',onMove); window.addEventListener('pointerup',onUp);
  el.addEventListener('wheel',onWheel,{passive:false}); window.addEventListener('resize',onResize);
  reg.cleanup=()=>{ el.removeEventListener('pointerdown',onDown); el.removeEventListener('pointermove',onMove); window.removeEventListener('pointerup',onUp); el.removeEventListener('wheel',onWheel); window.removeEventListener('resize',onResize); };

  function loop(){ reg.raf=requestAnimationFrame(loop); if(!down&&!reg.userInteract){ ry+=0.0035; root.rotation.y=ry; } renderer.render(scene,cam); }
  loop();
}

const MCLOCK_NOTE={LU:'Respiro profondo e sonno; momento ideale per alzarsi e meditare.',LI:'Eliminazione: evacuazione e idratazione al risveglio.',ST:'Digestione al massimo: fare una colazione abbondante.',SP:'Energia e lucidità mentale: lavoro e concentrazione.',HT:'Cuore e Shén: pasto leggero, attività e socialità.',SI:'Assimilazione dei nutrienti: il pranzo è già digerito.',BL:'Memoria e studio: idratarsi, lavorare di testa.',KI:'Energia vitale (Jīng): rallentare, cena leggera.',PC:'Circolazione e relazioni: rilassarsi, intimità.',TE:'Equilibrio di calore e ormoni: prepararsi al sonno.',GB:'Rigenerazione e decisioni: dormire entro le 23.',LR:'Disintossicazione e sangue: sonno profondo.'};
function meridClock(){
  const cx=160,cy=160,rO=150,rI=62;
  const segs=MCLOCK.map(([h,id],i)=>{const m=MERID.find(x=>x.id===id);
    const a0=(i*30-90)*Math.PI/180,a1=((i+1)*30-90)*Math.PI/180;
    const x0=cx+rO*Math.cos(a0),y0=cy+rO*Math.sin(a0),x1=cx+rO*Math.cos(a1),y1=cy+rO*Math.sin(a1);
    const xi1=cx+rI*Math.cos(a1),yi1=cy+rI*Math.sin(a1),xi0=cx+rI*Math.cos(a0),yi0=cy+rI*Math.sin(a0);
    const path=`M${x0.toFixed(1)} ${y0.toFixed(1)} A${rO} ${rO} 0 0 1 ${x1.toFixed(1)} ${y1.toFixed(1)} L${xi1.toFixed(1)} ${yi1.toFixed(1)} A${rI} ${rI} 0 0 0 ${xi0.toFixed(1)} ${yi0.toFixed(1)} Z`;
    const am=((i+0.5)*30-90)*Math.PI/180,rL=(rO+rI)/2;
    const lx=cx+rL*Math.cos(am),ly=cy+rL*Math.sin(am);
    const on=S.meridSel==='all'||S.meridSel===id;
    return `<path d="${path}" fill="${m.col}" opacity="${on?0.92:0.22}" stroke="var(--bg)" stroke-width="1.5" style="cursor:pointer" onclick="selMerid('${id}')"/>
      <text x="${lx.toFixed(1)}" y="${(ly-3).toFixed(1)}" text-anchor="middle" font-size="12" fill="#161210" style="pointer-events:none;font-weight:700">${id}</text>
      <text x="${lx.toFixed(1)}" y="${(ly+11).toFixed(1)}" text-anchor="middle" font-size="9" fill="#161210" style="pointer-events:none">${h}-${(h+2)%24}</text>`;
  }).join('');
  return `<svg viewBox="0 0 320 320" style="width:100%;max-width:330px;display:block;margin:2px auto">${segs}
    <circle cx="${cx}" cy="${cy}" r="${rI}" fill="var(--card)" stroke="var(--line2)" stroke-width="1.5"/>
    <text x="${cx}" y="${cy-4}" text-anchor="middle" fill="var(--gold)" style="font-family:var(--cal);font-size:22px">子午</text>
    <text x="${cx}" y="${cy+20}" text-anchor="middle" fill="var(--gold)" style="font-family:var(--cal);font-size:22px">流注</text>
   </svg>`;
}

function logPractice(min){const k=today();S.practice[k]=(S.practice[k]||0)+min;save();}
function streak(){let s=0;const d=new Date();
 if(!(S.practice[iso(d)]>0))d.setDate(d.getDate()-1);
 while(S.practice[iso(d)]>0){s++;d.setDate(d.getDate()-1);}
 return s;}
function barChart(days){
 const W=600,H=110,P=8,mx=Math.max(...days.map(x=>x.min),30);
 const bw=(W-2*P)/days.length;
 return `<svg class="chart" viewBox="0 0 ${W} ${H}">`+days.map((x,i)=>{
  const h=x.min?Math.max(3,x.min/mx*(H-26)):2;
  const col=x.k===today()?'#d9b35c':(x.min?'#3fa98c':'#3d2e21');
  return `<rect x="${(P+i*bw+1).toFixed(1)}" y="${(H-14-h).toFixed(1)}" width="${Math.max(1,bw-2).toFixed(1)}" height="${h.toFixed(1)}" fill="${col}"/>`;
 }).join('')+`<text x="${P}" y="${H-2}" fill="#a5947d" font-size="10">${days[0].k.slice(5).replace('-','/')}</text><text x="${W-P}" y="${H-2}" fill="#a5947d" font-size="10" text-anchor="end">oggi</text></svg>`;
}
function barChartG(items,curKey,lLabel,rLabel){
 const W=600,H=110,P=8,mx=Math.max(...items.map(x=>x.min),30);
 const bw=(W-2*P)/Math.max(1,items.length);
 return `<svg class="chart" viewBox="0 0 ${W} ${H}">`+items.map((x,i)=>{
  const h=x.min?Math.max(3,x.min/mx*(H-26)):2;
  const col=x.k===curKey?'var(--gold)':(x.min?'var(--jade)':'var(--line)');
  return `<rect x="${(P+i*bw+1).toFixed(1)}" y="${(H-14-h).toFixed(1)}" width="${Math.max(1,bw-2).toFixed(1)}" height="${h.toFixed(1)}" fill="${col}"/>`;
 }).join('')+`<text x="${P}" y="${H-2}" fill="#a5947d" font-size="10">${esc(lLabel)}</text><text x="${W-P}" y="${H-2}" fill="#a5947d" font-size="10" text-anchor="end">${esc(rLabel)}</text></svg>`;
}
function mondayOf(d){const x=new Date(d);const day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);return iso(x);}
function practiceWeeks(){
  const keys=Object.keys(S.practice).filter(k=>S.practice[k]>0);if(!keys.length)return [];
  keys.sort();const start=new Date(mondayOf(keys[0])),end=new Date(mondayOf(today()));const weeks=[];
  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+7)){const wk=iso(d);let sum=0;
    for(let i=0;i<7;i++){const dd=new Date(d);dd.setDate(dd.getDate()+i);sum+=S.practice[iso(dd)]||0;}
    weeks.push({k:wk,min:sum});}
  return weeks;
}

/* ==================== STORIA SOCIAL ==================== */
/* Colori coerenti col tema attivo, letti dalle CSS variables (--bg, --red, ...) con fallback al tema "ink". */
function themeCols(){
  let cs={};try{cs=getComputedStyle(document.documentElement);}catch(e){}
  const D={'--bg':'#171210','--bg2':'#241a12','--ink':'#0f0c0a','--txt':'#ece3d4','--mut':'#a5947d',
    '--red':'#c0452f','--gold':'#d9b35c','--gold2':'#a8853a','--line':'#3d2e21','--line2':'#54402c','--card':'#211913'};
  const g=k=>{const v=cs.getPropertyValue?cs.getPropertyValue(k).trim():'';return v||D[k];};
  return {bg:g('--bg'),bg2:g('--bg2'),ink:g('--ink'),txt:g('--txt'),mut:g('--mut'),
    red:g('--red'),gold:g('--gold'),gold2:g('--gold2'),line:g('--line'),line2:g('--line2'),card:g('--card')};
}
function storyBase(x,W,H){
  const c=themeCols();
  const g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,c.bg2);g.addColorStop(1,c.ink);
  x.fillStyle=g;x.fillRect(0,0,W,H);
  x.strokeStyle=c.gold2;x.lineWidth=4;x.strokeRect(50,50,W-100,H-100);
  x.strokeStyle=c.line2;x.lineWidth=2;x.strokeRect(66,66,W-132,H-132);
  const cx=W/2,cy=330,R=130;
  x.fillStyle=c.txt;x.beginPath();x.arc(cx,cy,R,0,7);x.fill();
  x.fillStyle=c.red;x.beginPath();x.arc(cx,cy,R,-Math.PI/2,Math.PI/2);
  x.arc(cx,cy+R/2,R/2,Math.PI/2,-Math.PI/2,true);x.arc(cx,cy-R/2,R/2,Math.PI/2,-Math.PI/2);x.fill();
  x.fillStyle=c.txt;x.beginPath();x.arc(cx,cy-R/2,18,0,7);x.fill();
  x.fillStyle=c.red;x.beginPath();x.arc(cx,cy+R/2,18,0,7);x.fill();
  x.textAlign='center';
  x.fillStyle=c.gold;x.font='600 64px "ZCOOL XiaoWei",serif';x.fillText('Taiji Progress',cx,560);
  x.fillStyle=c.mut;x.font='36px "Noto Serif",serif';
  x.fillText(new Date().toLocaleDateString(lang(),{day:'numeric',month:'long',year:'numeric'}),cx,615);
  return cx;
}
function storyFooter(x,W,H){const cx=W/2;const c=themeCols();
  x.textAlign='center';x.fillStyle=c.gold2;x.font='40px "Ma Shan Zheng",serif';x.fillText('千里之行，始於足下',cx,H-200);
  x.fillStyle=c.mut;x.font='26px "Noto Serif",serif';x.fillText(t('story_motto_t'),cx,H-150);}
function dlCanvas(cv,name){const a=document.createElement('a');a.download=name;a.href=cv.toDataURL('image/png');a.click();}
function clip(x,s,max){let r=s;if(x.measureText(r).width<=max)return r;while(r.length>1&&x.measureText(r+'…').width>max)r=r.slice(0,-1);return r+'…';}
function storySummary(){

   pb?['樁',t('st_besthold'), fmtT(pb)]:null,
   lastC?['賽',t('st_lastcomp'), lastC.name+' — '+lastC.score]:null,

  const c=themeCols();

function storyTimeline(){
  const W=1080,H=1920,cv=document.createElement('canvas');cv.width=W;cv.height=H;const x=cv.getContext('2d');
  storyBase(x,W,H);
  const c=themeCols();
  x.textAlign='center';x.fillStyle=c.gold;x.font='600 52px "ZCOOL XiaoWei",serif';x.fillText(t('story_tl_title'),W/2,720);
  const evs=[...S.titles.map(ti=>({d:ti.date,t2:false,h:'🎓 '+ti.t})),

function adviceList(){
  const out=[];
  const wip=S.forms.flatMap(f=>f.figures.filter(x=>x.s===1).map(x=>({f:f.name,n:x.n.split('–')[0].trim()})));
  if(wip.length>3)out.push(tt('adv_focus',{n:wip.length,fig:wip[0].n,form:wip[0].f}));
  else if(wip.length)out.push(tt('adv_working',{list:wip.map(w=>w.n).join(', ')}));
  const f0=S.forms.find(f=>f.figures.length&&memo(f)<f.figures.length);
  if(f0)out.push(tt('adv_next',{fig:f0.figures[curIdx(f0)].n.split('–')[0].trim(),form:f0.name}));
  const dets=S.forms.flatMap(f=>f.details.filter(d=>d.s<2).map(d=>d.t+' ('+f.name.split(' ')[0]+')'));
  if(dets.length)out.push(tt('adv_details',{list:dets.slice(0,3).join(' · ')+(dets.length>3?' …':'')}));
  const noTimes=S.forms.filter(f=>memo(f)===f.figures.length&&f.figures.length&&!f.times.length);
  if(noTimes.length)out.push(tt('adv_timer',{form:noTimes[0].name}));
  if(!S.palo.some(p=>p.times.length))out.push(t('adv_no_palo'));
  if(!(S.practice[today()]>0))out.push(t('adv_no_today'));
  else if(streak()>=3)out.push(tt('adv_streak',{n:streak()}));
  if(!out.length)out.push(t('adv_ok'));
  return out;
}

/* ==================== NOTIFICHE INTERNE ====================
   Allievo: avviso quando l'istruttore lascia una NOTA o RISPONDE a un consiglio.
   Istruttore: avviso quando un allievo INVIA una richiesta di consiglio.
   Confronto del timestamp degli elementi con la marca "S.seen". */
let NOTIF={notes:0,replies:0,requests:0};
let _notifPoll=null;
const tms=v=>{try{return v?new Date(v).getTime():0;}catch(e){return 0;}};
async function checkNotifications(announce){
  if(!sb||!AUTH||!AUTH.user||!AUTH.profile)return;
  const prev={...NOTIF};
  try{
    if(AUTH.profile.role==='instructor'){
      // nuove richieste di consiglio senza risposta
      const {data}=await sb.from('advice_requests').select('created_at,answer').eq('instructor_id',AUTH.user.id).is('answer',null);
      NOTIF.requests=(data||[]).filter(a=>tms(a.created_at)>(S.seen.requests||0)).length;
    }else{
      const sid=AUTH.user.id;
      const {data:notes}=await sb.from('student_notes').select('created_at').eq('student_id',sid);
      NOTIF.notes=(notes||[]).filter(n=>tms(n.created_at)>(S.seen.notes||0)).length;
      const {data:adv}=await sb.from('advice_requests').select('answered_at,answer').eq('student_id',sid).not('answer','is',null);
      NOTIF.replies=(adv||[]).filter(a=>tms(a.answered_at)>(S.seen.replies||0)).length;
    }
  }catch(e){return;}
  // toast solo se è comparso qualcosa di NUOVO rispetto al giro precedente
  if(announce!==false){
    if(NOTIF.requests>prev.requests)toast('🔔 Nuova richiesta da un allievo');
    if(NOTIF.notes>prev.notes)toast('🔔 Nuova nota dal tuo istruttore');
    if(NOTIF.replies>prev.replies)toast('🔔 Il tuo istruttore ha risposto');
  }
  renderChrome();
}
function startNotifPoll(){
  if(!sb||!AUTH||!AUTH.user)return;
  clearInterval(_notifPoll);
  checkNotifications(false);                       // primo giro silenzioso (mostra solo i badge)
  _notifPoll=setInterval(()=>checkNotifications(true),60000); // poi ogni minuto, con avviso
  // ricontrolla anche quando la pagina torna in primo piano
  document.removeEventListener('visibilitychange',_onVis);
  document.addEventListener('visibilitychange',_onVis);
}
function _onVis(){if(!document.hidden)checkNotifications(true);}
/* segna come "viste" le notifiche di un tipo (quando l'utente apre la sezione relativa) */
function markSeen(kind){
  const now=Date.now();
  if(kind==='student'){S.seen.notes=now;S.seen.replies=now;NOTIF.notes=0;NOTIF.replies=0;}
  else if(kind==='instructor'){S.seen.requests=now;NOTIF.requests=0;}
  save();renderChrome();
}

/* ==================== CONTENUTI ISTRUTTORE CONDIVISI ====================
   L'istruttore definisce la STRUTTURA del curriculum (forme, figure, livelli,
   esercizi, video, timestamp); gli allievi la ricevono mantenendo il PROPRIO
   stato di avanzamento (s, tempi). */
function instructorContentPayload(){
  return {
    v:1, updated:new Date().toISOString(),
    levels:Array.isArray(S.levels)?S.levels:null,
    forms:(S.forms||[]).map(f=>({
      id:f.id,name:f.name,cat:f.cat,lvl:f.lvl||'int',video:f.video||'',custom:!!f.custom,
      figures:(f.figures||[]).map(x=>({n:x.n,t:x.t!=null?x.t:null,img:x.img||''})),
      details:(f.details||[]).map(d=>({t:d.t}))
    })),
    tuishou:secExercises('tuishou'), combat:secExercises('combat'), csg:secExercises('csg'),
    fondmn:secExercises('fondmn'), fondarmi:secExercises('fondarmi'),
    sectionLevels:S.sectionLevels||null,
    // struttura completa del palo (nome, carattere, descrizione, categoria, video/screenshot) — NON i tempi di tenuta dell'allievo
    palo:(S.palo||[]).map((p,i)=>({id:p.id,t:p.t,zh:p.zh||'',desc:p.desc||'',g:p.g||'',cdf:!!p.cdf,video:p.video||'',vt:p.vt!=null?p.vt:null,img:p.img||'',ord:i}))
  };
}
function secExercises(key){return (S[key]||[]).map(x=>({id:x.id,t:x.t,zh:x.zh||'',han:x.han||'',py:x.py||'',g:x.g||'',v:x.v||'',vt:x.vt!=null?x.vt:null,img:x.img||''}));}
/* applica la struttura dell'istruttore preservando lo stato dell'allievo */
function applyInstructorContent(data){
  if(!data)return;
  if(Array.isArray(data.levels)&&data.levels.length)S.levels=data.levels;
  if(Array.isArray(data.forms)){
    const byId={};(S.forms||[]).forEach(f=>byId[f.id]=f);
    const merged=data.forms.map(src=>{
      const cur=byId[src.id]||{figures:[],details:[],times:[]};
      const figures=src.figures.map((fx,i)=>{
        const old=cur.figures&&cur.figures[i];
        return {n:fx.n,t:fx.t,img:fx.img||(old&&old.img)||'',s:old?old.s:0}; // preserva lo stato s
      });
      const details=(src.details||[]).map((dx,i)=>{const old=cur.details&&cur.details[i];return {t:dx.t,s:old?old.s:0,note:old?old.note:''};});
      return {id:src.id,name:src.name,cat:src.cat,lvl:src.lvl,video:src.video,custom:src.custom,
        figures,details,times:cur.times||[],note:cur.note||''};
    });
    // mantieni eventuali forme personali dell'allievo non presenti nel curriculum
    (S.forms||[]).forEach(f=>{if(!data.forms.find(s=>s.id===f.id))merged.push(f);});
    S.forms=merged;
  }
  ['tuishou','combat','csg','fondmn','fondarmi'].forEach(key=>{
    if(Array.isArray(data[key])){
      const old=S[key]||[];
      S[key]=data[key].map((sx,i)=>{const o=old[i]; return {id:sx.id||uid(),t:sx.t,zh:sx.zh,han:sx.han,py:sx.py,g:sx.g,v:sx.v,vt:sx.vt!=null?sx.vt:null,img:sx.img||'',s:o?o.s:0,note:o?o.note:''};});
    }
  });
  if(data.sectionLevels)S.sectionLevels=data.sectionLevels;
  if(data.fondMedia)S.fondMedia=data.fondMedia;
  if(Array.isArray(data.palo)){ // struttura palo dell'istruttore, preservando i tempi di tenuta (times) dell'allievo
    const byId={};(S.palo||[]).forEach(p=>{byId[p.id]=p;});
    const byName={};(S.palo||[]).forEach(p=>{byName[p.t]=p;});

function lessonLabel(date,title){

  lab=(lab?lab.charAt(0).toUpperCase()+lab.slice(1):'')+(date?' '+fmtD(date):'');

}
const LES_STATE_ICON=['⬜','👁','💡','✅'];
/* prova a trasformare un LINK semplice in un URL di embed (iframe) per mostrare il video nell'app */
function toEmbedUrl(url){
  if(!url)return null;
  try{
    const u=new URL(url);const h=u.hostname.replace(/^www\./,'');
    // YouTube
    if(h.includes('youtu.be'))return 'https://www.youtube.com/embed/'+u.pathname.slice(1).split('/')[0];
    if(h.includes('youtube.com')){
      if(u.pathname==='/watch'&&u.searchParams.get('v'))return 'https://www.youtube.com/embed/'+u.searchParams.get('v');
      if(u.pathname.startsWith('/embed/'))return url;
      if(u.pathname.startsWith('/shorts/'))return 'https://www.youtube.com/embed/'+u.pathname.split('/shorts/')[1];
    }
    // Vimeo
    if(h.includes('vimeo.com')){const id=u.pathname.split('/').filter(Boolean)[0];if(/^\d+$/.test(id))return 'https://player.vimeo.com/video/'+id;}
    // Wistia
    if(h.includes('wistia')){const seg=u.pathname.split('/').filter(Boolean);const wid=seg[seg.length-1];if(wid)return 'https://fast.wistia.net/embed/iframe/'+wid;}
    // Google Drive
    if(h.includes('drive.google.com')){const m=u.pathname.match(/\/d\/([^/]+)/);if(m)return 'https://drive.google.com/file/d/'+m[1]+'/preview';}
    return null;
  }catch(e){return null;}
}
/* HTML del player per una lezione: usa l'iframe incollato, oppure auto-embed dal link, oppure file video diretto */
function lessonEmbedHtml(url){
  if(!url)return '';
  if(/<iframe|<video|<embed/i.test(url))return `<div class="lesvid-raw">${url}</div>`;
  const emb=toEmbedUrl(url);
  if(emb)return `<div class="lesvid"><iframe src="${esc(emb)}" allow="autoplay; encrypted-media; fullscreen; picture-in-picture" allowfullscreen></iframe></div>`;
  if(/\.(mp4|webm|ogg|mov|m4v)(\?|$)/i.test(url))return `<div class="lesvid"><video src="${esc(url)}" controls playsinline style="width:100%;height:100%"></video></div>`;
  return '';
}

   Strumento per associare un video (YouTube/Wistia) a una forma o a una sezione con

   nel browser da un file video locale. Gli screenshot si scaricano come file JPG da

let _vs={frames:[],dur:0};
/* Elenco delle destinazioni: forme, posizioni del palo, sezioni a esercizi. Value = "kind:id" */
const VS_SECTIONS=[['fondmn','基 Fondamentali · Gambe'],['csg','纏 Chan Si Gong'],['fondarmi','器 Fondamentali · Armi'],['tuishou','推 Tui Shou'],['combat','武 Combattimento']];
function vsTargets(){
  const out=[];
  (S.forms||[]).forEach(f=>out.push({value:'form:'+f.id,label:'形 '+(f.cat==='armi'?'器 ':'')+f.name+' ('+f.figures.length+' fig.)'}));
  // posizioni del palo SINGOLE (non l'aggregato e non gli step della camicia di ferro)
  (S.palo||[]).forEach(p=>{if(!p.cdf&&!p.desc)out.push({value:'palo:'+p.id,label:'樁 '+p.t});});
  // la camicia di ferro è UNA sequenza unica: una sola voce, con i suoi step come fotogrammi
  const cdf=(S.palo||[]).find(p=>p.cdf);const steps=(S.palo||[]).filter(p=>p.desc);
  if(cdf&&steps.length)out.push({value:'palocdf:'+cdf.id,label:'鐵 '+cdf.t+' ('+steps.length+' posiz.)'});
  VS_SECTIONS.forEach(([k,lab])=>{if(S[k]&&S[k].length)out.push({value:'sec:'+k,label:lab+' ('+S[k].length+')'});});
  return out;
}
/* Restituisce {kind, get slots():[{name,t,img,set(t,img)}], setVideo(url), video} per la destinazione scelta */
function vsResolve(value){
  const parts=(value||'').split(':');const kind=parts[0];
  if(kind==='form'){const f=S.forms.find(x=>x.id===parts[1]);if(!f)return null;
    return {kind,obj:f,get video(){return f.video||'';},setVideo(u){f.video=u;},
      slots:f.figures.map((x,i)=>({name:x.n,get t(){return x.t;},get img(){return x.img;},set(t,img){x.t=t;if(img!=null)x.img=img;if(x.name==null)x.n=x.n;},setName(n){if(n)x.n=n;},ensure(){}})),
      ensureLen(n){while(f.figures.length<n)f.figures.push({n:'Figura '+(f.figures.length+1),s:0,t:null});}};
  }
  if(kind==='palo'){const p=S.palo.find(x=>x.id===parts[1]);if(!p)return null;
    return {kind,obj:p,get video(){return p.video||'';},setVideo(u){p.video=u;},
      slots:[{name:p.t,get t(){return p.vt;},get img(){return p.img;},set(t,img){p.vt=t;if(img!=null)p.img=img;},setName(){},ensure(){}}],
      ensureLen(){}};
  }
  if(kind==='sec'){const key=parts[1];const arr=S[key];if(!arr)return null;
    return {kind,key,get video(){return arr[0]?arr[0].v||'':'';},setVideo(u){arr.forEach(x=>x.v=u);},
      slots:arr.map(x=>({name:x.t,get t(){return x.vt;},get img(){return x.img;},set(t,img){x.vt=t;if(img!=null)x.img=img;},setName(){},ensure(){}})),
      ensureLen(){}};
  }
  if(kind==='palocdf'){const cdf=S.palo.find(x=>x.id===parts[1]);if(!cdf)return null;
    const steps=S.palo.filter(p=>p.desc); // gli step della sequenza camicia di ferro
    return {kind,obj:cdf,get video(){return cdf.video||'';},setVideo(u){cdf.video=u;steps.forEach(s=>s.video=u);},
      slots:steps.map(s=>({name:s.t,get t(){return s.vt;},get img(){return s.img;},set(t,img){s.vt=t;if(img!=null)s.img=img;},setName(){},ensure(){}})),
      ensureLen(){}};
  }
  return null;
}

function vsCss(){

function vsParseTs(){
  const raw=(document.getElementById('vs_ts')||{}).value||'';
  return raw.split('\n').map(l=>l.trim()).filter(Boolean).map(l=>{
    const mm=l.match(/^(\d{1,2}:\d{2}(?::\d{2})?|\d+(?:\.\d+)?)\s*(.*)$/);
    if(!mm)return null;
    const t=parseTs(mm[1])!=null?parseTs(mm[1]):parseFloat(mm[1]);
    return {t:t,name:(mm[2]||'').trim()};
  }).filter(x=>x&&!isNaN(x.t));
}
function vsTarget(){return vsResolve((document.getElementById('vs_target')||{}).value);}
function vsTargetId(){return ((document.getElementById('vs_target')||{}).value||'').split(':').slice(1).join('-');}
function vsFill(){
  const T=vsTarget();if(!T)return;
  if(document.getElementById('vs_url'))document.getElementById('vs_url').value=T.video||'';
  document.getElementById('vs_ts').value=T.slots.map(s=>`${s.t!=null?fmtT(s.t):'0:00'}  ${s.name||''}`).join('\n');
  toast('Precompilato');
}
function vsApplyMeta(){
  const T=vsTarget();if(!T){toast('Scegli una destinazione');return;}
  const url=(document.getElementById('vs_url')||{}).value.trim();
  const list=vsParseTs();
  if(url)T.setVideo(url);
  if(T.ensureLen)T.ensureLen(list.length);
  const T2=vsTarget(); // ri-risolvi dopo eventuale ensureLen (per le forme che aggiungono figure)
  list.forEach((it,i)=>{const s=T2.slots[i];if(!s)return;s.set(Math.round(it.t),null);if(it.name&&s.setName)s.setName(it.name);});
  saveContent();toast('✓ Link e tempi applicati (condivisi con i tuoi allievi)');
}
function vsLoadFile(ev){
  const file=ev.target.files&&ev.target.files[0];if(!file)return;
  const v=document.getElementById('vs_video');
  v.src=URL.createObjectURL(file);
  v.onloadedmetadata=()=>{_vs.dur=v.duration;document.getElementById('vs_extract').disabled=false;
    document.getElementById('vs_status').textContent='Video caricato · durata '+fmtT(v.duration);};
}
function wistiaId(url){try{const u=new URL(url);if(!u.hostname.includes('wistia'))return null;
  const seg=u.pathname.split('/').filter(Boolean);return seg[seg.length-1]||null;}catch(e){return null;}}
async function vsTryLink(){
  const url=(document.getElementById('vs_url')||{}).value.trim();
  const msg=document.getElementById('vs_linkmsg');
  const wid=wistiaId(url);
  if(!wid){msg.textContent=' — il link non è Wistia: usa l\'opzione ② (file) — YouTube non consente l\'estrazione dal link.';return;}
  msg.textContent=' — recupero il video da Wistia…';
  try{
    const r=await fetch(`https://fast.wistia.com/embed/medias/${wid}.json`);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    const assets=((j.media&&j.media.assets)||[]).filter(a=>/mp4|\.bin/i.test(a.url||'')&&(a.type||'').toLowerCase().indexOf('audio')<0);
    // preferisci una risoluzione media (~480-720) per velocità
    assets.sort((a,b)=>(a.width||0)-(b.width||0));
    const pick=assets.find(a=>(a.width||0)>=480)||assets[assets.length-1];
    if(!pick||!pick.url)throw new Error('nessun MP4 disponibile');
    const v=document.getElementById('vs_video');
    v.crossOrigin='anonymous';
    v.src=pick.url.replace('.bin','/file.mp4');
    v.onloadedmetadata=()=>{_vs.dur=v.duration;_vs.fromLink=true;document.getElementById('vs_extract').disabled=false;
      document.getElementById('vs_status').textContent='Video Wistia pronto · durata '+fmtT(v.duration);};
    v.onerror=()=>{msg.textContent=' — impossibile leggere il file (il video non è scaricabile/CORS). Usa l\'opzione ② (file).';};
    msg.textContent=' — caricamento…';
  }catch(e){
    msg.textContent=' — non riesco a leggere il video dal link ('+((e&&e.message)||e)+'). Su Wistia attiva il download del media, oppure usa l\'opzione ② (file).';
  }
}
function vsSeek(v,t){return new Promise(res=>{const on=()=>{v.removeEventListener('seeked',on);res();};v.addEventListener('seeked',on);v.currentTime=Math.min(t,Math.max(0,(_vs.dur||t)-0.05));});}
async function vsExtract(){
  const v=document.getElementById('vs_video'),c=document.getElementById('vs_canvas');
  const list=vsParseTs();
  if(!list.length){toast('Inserisci i minutaggi');return;}
  const W=480,scale=W/(v.videoWidth||W),H=Math.round((v.videoHeight||W)*scale);
  c.width=W;c.height=H;const ctx=c.getContext('2d');
  _vs.frames=[];const grid=document.getElementById('vs_grid');grid.innerHTML='';
  const st=document.getElementById('vs_status');
  for(let i=0;i<list.length;i++){
    st.textContent=`Estrazione ${i+1}/${list.length} …`;
    await vsSeek(v,list[i].t);
    await new Promise(r=>setTimeout(r,60));
    ctx.drawImage(v,0,0,W,H);
    let url;
    try{url=c.toDataURL('image/jpeg',0.82);}
    catch(err){st.innerHTML='⚠ Il video dal link non è leggibile dal browser (protezione CORS). Su Wistia abilita il download del media, oppure usa l\'opzione ② (file locale).';document.getElementById('vs_dlall').disabled=true;return;}
    const name=String(i+1).padStart(2,'0')+'.jpg';
    _vs.frames.push({url,name,fig:list[i].name,t:list[i].t});
    grid.insertAdjacentHTML('beforeend',`<div class="vscell"><img src="${url}"><div class="cap"><b>${i+1}</b><span>${fmtT(list[i].t)}</span><a href="${url}" download="${name}" title="Scarica">⬇</a></div></div>`);
  }
  const T=vsTarget();
  if(T&&T.kind==='form'){
    st.textContent=`Fatto: ${_vs.frames.length} fotogrammi. Scaricali e mettili in figure/${vsTargetId()}/ (poi caricali col sito).`;
  }else{
    st.innerHTML=`Fatto: ${_vs.frames.length} fotogrammi. <button class="btn sm" onclick="vsApplyShots()">📎 Applica screenshot a questa sezione</button>`;
  }
  document.getElementById('vs_dlall').disabled=false;
}
/* applica gli screenshot estratti (data-URL) direttamente ai dati — per palo e fondamentali */
function vsApplyShots(){
  const T=vsTarget();if(!T)return;
  _vs.frames.forEach((fr,i)=>{const s=T.slots[i];if(s)s.set(s.t!=null?s.t:Math.round(fr.t),fr.url);});
  saveContent();toast('✓ Screenshot applicati (condivisi con i tuoi allievi)');
}
async function vsDownloadAll(){
  for(const fr of _vs.frames){
    const a=document.createElement('a');a.href=fr.url;a.download=fr.name;document.body.appendChild(a);a.click();a.remove();
    await new Promise(r=>setTimeout(r,250)); // evita che il browser blocchi i download multipli
  }
  toast('Download avviati ('+_vs.frames.length+')');
}

function ensureLevels(){ if(!Array.isArray(S.levels)||!S.levels.length){
  S.levels=getLevels().map(([lv,zh,lk])=>({lv,zh,name:lvlLabel(lv)})); } return S.levels; }

function sectionItems(key){ // per il palo si gestiscono solo le posizioni singole (non l'aggregato camicia di ferro né i suoi step)
  if(key==='palo')return (S.palo||[]).filter(p=>!p.cdf&&!p.desc);
  return S[key]||[];
}
function sectionGroups(key){
  const set=[];sectionItems(key).forEach(x=>{const g=x.g||'';if(!set.includes(g))set.push(g);});
  const order=(S.sectionLevels&&S.sectionLevels[key]);
  if(order){set.sort((a,b)=>{const ia=order.indexOf(a),ib=order.indexOf(b);return (ia<0?999:ia)-(ib<0?999:ib);});}
  return set;
}
function setSectionOrder(key,arr){if(!S.sectionLevels)S.sectionLevels={};S.sectionLevels[key]=arr;}

function sgRename(key,i,v){const groups=sectionGroups(key);const oldG=groups[i];const nw=(v||'').trim();

function sgMove(key,i,d){const groups=sectionGroups(key);const j=i+d;if(j<0||j>=groups.length)return;

function lvlMove(i,d){ensureLevels();const j=i+d;if(j<0||j>=S.levels.length)return;

function lvlRemove(i){ensureLevels();

function studentSummary(d){
  if(!d||!d.forms)return '';
  const withF=d.forms.filter(f=>f.figures&&f.figures.length);
  const tot=withF.reduce((a,f)=>a+f.figures.length,0);
  const mem=withF.reduce((a,f)=>a+f.figures.filter(x=>x.s>=2).length,0);
  const pb=Math.max(0,...(d.palo||[]).map(p=>p.times&&p.times.length?Math.max(...p.times.map(x=>x.ms)):0))/1000;
  const comps=(d.comps||[]).length,titles=(d.titles||[]).length;
  let st=0;const day=new Date();const pr=d.practice||{};
  const isod=x=>x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');
  if(!(pr[isod(day)]>0))day.setDate(day.getDate()-1);
  while(pr[isod(day)]>0){st++;day.setDate(day.getDate()-1);}
  return `形 <b>${mem}/${tot}</b> · 練 <b>${st}</b> · 樁 <b>${pb?fmtT(pb):'—'}</b> · 賽 <b>${comps}</b> · 段 <b>${titles}</b>`;
}
/* ==================== GUIDA (sezione di aiuto) ==================== */

   ['纏','Chan Si Gong',t('g_csg')],
   ['樁',secLabel('palo'),t('g_palo')],
   ['練',secLabel('pratica'),t('g_pratica')],
   ['譜',secLabel('curr'),t('g_curr')],
   ['課',secLabel('lezioni'),t('g_lezioni')],
   ['💡',t('adv_title'),t('g_assist')]
  ];
  app.innerHTML=`<h2 style="margin:6px 0 4px">${esc(t('guide_title'))}</h2>
   <p class="hint" style="margin-top:0">${esc(t('guide_intro'))}</p>
   ${items.map(([zh,h,b])=>`<div class="sec" style="cursor:default"><h4><span class="zh" style="font-family:var(--cal);color:var(--red);margin-right:6px">${zh}</span>${esc(h)}</h4><p style="margin:0">${esc(b)}</p></div>`).join('')}
   <div class="sec" style="cursor:default"><h4>${esc(t('theme_label'))} · ${esc(t('lang_label'))}</h4><p style="margin:0">${esc(t('g_settings'))}</p></div>
   ${isInstr()?`<div class="sec" style="cursor:default;border:1px solid var(--gold2)"><h4><span class="zh" style="font-family:var(--cal);color:var(--gold);margin-right:6px">師</span>${esc(t('g_instr_h'))}</h4><p style="margin:0;white-space:pre-line">${esc(t('g_instr')).split(' • ').join('\n• ')}</p></div>`:''}`;
}

if('serviceWorker' in navigator&&(location.protocol==='https:'||location.hostname==='localhost'))
  navigator.serviceWorker.register('sw.js').catch(()=>{});

load();
if(supaReady())authInit();else render();
</script>
